name: Swift

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:

    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v7
    - name: Build
      run: swift build -c release --disable-sandbox --arch arm64 --arch x86_64
    - name: Run tests
      run: |
        mkdir -p .build/test-results
        swift test -v --xunit-output .build/test-results/tests.xml
    - uses: actions/upload-artifact@v7
      if: always()
      with:
          name: test-results
          path: .build/test-results/tests.xml
    - uses: actions/upload-artifact@v7
      with:
          name: xcresultparser
          path: .build/apple/Products/Release/xcresultparser
